{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow animate__animated animate__fadeInUp">
            <div class="card-header bg-warning text-dark text-center py-3">
                <h4 class="mb-0"><i class="fas fa-key me-2"></i>Восстановление пароля</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted mb-4">
                    Введите email, указанный при регистрации. Мы отправим ссылку для сброса пароля.
                </p>
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" 
                               placeholder="example@mail.ru" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">
                        <i class="fas fa-paper-plane me-2"></i>Отправить ссылку
                    </button>
                </form>
                <hr>
                <div class="text-center">
                    <a href="{{ url_for('routes.login') }}" class="text-decoration-none">
                        <i class="fas fa-arrow-left me-1"></i>Вернуться ко входу
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
